<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>image upload </title>
</head>
<body>
    <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form.as_p}}
    
    <button type="submit">upload</button>
    </form>
    {% if saved_object %}
    <h2>Upload Successfull:{{saved_object.image.url}}</h2>
    <h2>Upload Successfull:{{saved_object.description}}</h2>
    <img src="{{saved_object.image.url}}" alt="image"  style="max-height: 500px;">
   
    {% endif %}
</body>
</html>
