<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>file upload </title>
</head>
<body>
    <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{form.as_p}}
    
    <button type="submit">upload</button>
    </form>
    {% if saved_object %}
    <h2>Upload Successfull:{{saved_object.file.url}}</h2>
    <h2>Upload Successfull:{{saved_object.description}}</h2>
   
    {% endif %}
</body>
</html>
